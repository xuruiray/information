name: Daily Newspaper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to generate"
        required: true
        default: "ai-tech"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Validate config
        run: python -m information_daily validate-config --profile "${PROFILE}"
        env:
          PROFILE: ${{ github.event.inputs.profile || 'ai-tech' }}
      - name: Generate newspaper
        run: python -m information_daily generate --profile "${PROFILE}" --out docs
        env:
          PROFILE: ${{ github.event.inputs.profile || 'ai-tech' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      - name: Commit generated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: publish daily newspaper"
          file_pattern: "docs data"
