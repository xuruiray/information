profile:
  id: "ai-tech"
  name: "AI 科技编程"
  source_packages:
    - tech
    - papers
    - startup
    - world
    - finance
    - x
  selection:
    lookback_hours: 72
    max_raw_items: 180
    max_per_source: 12
    min_score: 0
  llm:
    enabled: true
    provider: "openai-compatible"
    api_key_env: "OPENAI_API_KEY"
    base_url_env: "OPENAI_BASE_URL"
    model_env: "OPENAI_MODEL"
    default_base_url: "https://api.openai.com/v1"
    default_model: "gpt-4o-mini"
    temperature: 0.2
    max_input_items: 100
    summary_style: "中文，简洁，适合日报；保留事实，不夸大，不编造。每天必须覆盖 AI 科技、国际事务、财经理财三个大类。"
  sections:
    - id: "ai-tech"
      title: "AI 科技"
      icon: "01"
      max_articles: 14
      keywords:
        - ai
        - artificial intelligence
        - llm
        - model
        - openai
        - anthropic
        - google ai
        - hugging face
        - agent
        - technology
        - tech
        - developer
        - programming
        - javascript
        - python
        - database
        - frontend
        - backend
        - engineering
        - github
        - open source
        - cli
        - tool
        - framework
        - library
        - release
        - startup
        - product
        - funding
        - arxiv
        - paper
        - research
